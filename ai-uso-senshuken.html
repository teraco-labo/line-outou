<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>第5回 AI嘘つき選手権 ワークシート | TERACO.LABO</title>
<style>
  :root{
    --bg:#fffaf2;
    --card:#ffffff;
    --ink:#33312e;
    --sub:#7a756d;
    --accent:#ff8a3d;
    --accent-dark:#e96f1f;
    --line:#efe7da;
    --soft:#fff3e6;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.7;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:640px;margin:0 auto;padding:0 18px 60px;}

  .back{display:inline-block;margin:18px 0 6px;color:var(--accent-dark);text-decoration:none;font-size:13px;font-weight:700;}

  header{text-align:center;padding:12px 6px 20px;}
  .brand{font-size:12px;letter-spacing:.18em;color:var(--accent-dark);font-weight:700;}
  header h1{font-size:24px;margin-top:8px;line-height:1.4;}
  header .subt{margin-top:8px;font-size:15px;color:var(--accent-dark);font-weight:700;}
  header .kind{margin-top:10px;font-size:12.5px;color:var(--sub);}

  .info{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:16px 18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(120,90,40,.05);
  }
  .info h2{font-size:14.5px;display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .info h2 .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);flex:none;}
  .info ol{margin:0 0 4px 1.2em;font-size:13.5px;}
  .info ol li{margin-bottom:2px;}
  .info .caution{
    margin-top:10px;font-size:12.5px;color:var(--sub);
    background:var(--soft);border-radius:10px;padding:10px 12px;
  }

  .copybar{position:sticky;top:0;z-index:5;background:var(--bg);padding:8px 0 12px;}
  .copy{
    display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
    background:linear-gradient(135deg,#ff9a4d,#f97316);color:#fff;border:none;
    font-weight:700;font-size:16px;padding:15px;border-radius:12px;cursor:pointer;
    box-shadow:0 4px 12px rgba(233,111,31,.25);transition:transform .12s ease;
  }
  .copy:active{transform:scale(.99);}
  .copy.done{background:#3aa76d;box-shadow:0 4px 12px rgba(58,167,109,.25);}
  .subcopy{display:flex;gap:8px;margin-top:8px;}
  .subcopy button{
    flex:1;border:1px solid var(--line);background:var(--card);color:var(--accent-dark);
    font-weight:700;font-size:13px;padding:11px;border-radius:10px;cursor:pointer;
  }
  .subcopy button:active{background:var(--soft);}
  .subcopy button.done{background:#3aa76d;color:#fff;border-color:#3aa76d;}

  .pv-h{font-size:14px;display:flex;align-items:center;gap:8px;margin:16px 2px 10px;color:var(--sub);}
  .pv-h .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}
  .preview{
    background:#fffdfa;border:1px solid var(--line);border-radius:14px;
    padding:16px;font-size:13.5px;white-space:pre-wrap;word-break:break-word;
    color:var(--ink);line-height:1.75;
  }

  footer{text-align:center;margin-top:32px;padding-top:20px;border-top:1px solid var(--line);color:var(--sub);font-size:12px;}
  footer a{color:var(--accent-dark);text-decoration:none;}
</style>
</head>

<div class="wrap">

  <a class="back" href="./">← てらこ図書館にもどる</a>

  </header>

  <div class="info">
    <h2><span class="dot"></span>使い方</h2>
    <ol>
      <li>下の「ワークシート全文をコピー」を押す</li>
      <li>Googleドキュメントで新しいドキュメントを開く</li>
      <li>貼り付ける（長押し → 貼り付け）</li>
      <li>名前を書いて、授業中に入力していく</li>
    </ol>
    <div class="caution">このワークは、AIをバカにするためのものではありません。AIの答えを安全に使うために、怪しい情報を見つけて、証拠で確認する練習です。</div>
  </div>

  <div class="copybar">
    <button type="button" class="copy" id="copyAll">ワークシート全文をコピー</button>
    <div class="subcopy">
      <button type="button" id="copyQ">質問例だけコピー</button>
      <button type="button" id="copyM">発表メモだけコピー</button>
    </div>
  </div>

  <div class="pv-h"><span class="dot"></span>ワークシート本文（プレビュー）</div>
  <div class="preview" id="preview"></div>

  <footer>
    <a href="https://anomalocaress.github.io/teraco-labo-website-v2/" target="_blank" rel="noopener">© TERACO.LABO</a>
  </footer>

</div>

  function copyText(text, btn, label){
    function done(){
      var orig = label;
      btn.textContent = 'コピーしました';
      btn.classList.add('done');
      setTimeout(function(){ btn.textContent = orig; btn.classList.remove('done'); }, 1800);
    }
    function fallback(){
      var ta=document.createElement('textarea');
      ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
      document.body.appendChild(ta);ta.select();
      try{document.execCommand('copy');}catch(e){
        btn.textContent='コピーできませんでした。本文を選択してコピーしてください';
        setTimeout(function(){btn.textContent=label;},2600);
      }
      document.body.removeChild(ta);
    }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(done, function(){ fallback(); done(); });
    }else{ fallback(); done(); }
  }

  document.getElementById('copyAll').addEventListener('click',function(){

  });
